version: "3.9"

services:
  # ─────────────────────────────────────────────
  # Hyperliquid WebSocket Collector
  # ─────────────────────────────────────────────
  hyperliquid-collector:
    build:
      context: ./src/hyperliquid-service
      dockerfile: Dockerfile
    container_name: hl-collector
    restart: unless-stopped
    ports:
      - "8090:8090"
    env_file:
      - .env
    environment:
      - HYPERLIQUID_WS_URL=wss://api.hyperliquid.xyz/ws
      - HYPERLIQUID_COINS=["BTC","ETH","SOL"]
      - HYPERLIQUID_INTERVALS=["15m"]
      - HYPERLIQUID_HOST=0.0.0.0
      - HYPERLIQUID_PORT=8090
    networks:
      - datascience

  # ─────────────────────────────────────────────
  # API Gateway (existing, optional)
  # ─────────────────────────────────────────────
  api-gateway:
    build:
      context: ./src/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - hyperliquid-collector
    networks:
      - datascience
    profiles:
      - full    # only start with: docker compose --profile full up

  # ─────────────────────────────────────────────
  # Frontend (existing, optional)
  # ─────────────────────────────────────────────
  web-service:
    build:
      context: ./src/web-service
      dockerfile: Dockerfile
    container_name: web-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway
    networks:
      - datascience
    profiles:
      - full

networks:
  datascience:
    driver: bridge
