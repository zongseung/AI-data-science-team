<!DOCTYPE html>
<html><head><title>WS Debug</title></head>
<body style="background:#111;color:#0f0;font-family:monospace;padding:20px">
<h3>Hyperliquid WS Debug</h3>
<div id="status">Connecting...</div>
<div id="log" style="max-height:500px;overflow:auto;font-size:12px"></div>
<script>
const log = document.getElementById('log')
const status = document.getElementById('status')
let count = 0
let lastOpenTime = null

const ws = new WebSocket('wss://api.hyperliquid.xyz/ws')
ws.onopen = () => {
  status.textContent = 'CONNECTED'
  status.style.color = '#0f0'
  ws.send(JSON.stringify({
    method: 'subscribe',
    subscription: { type: 'candle', coin: 'BTC', interval: '1m' }
  }))
}
ws.onmessage = (e) => {
  const msg = JSON.parse(e.data)
  if (msg.channel !== 'candle') {
    log.innerHTML = `<div style="color:#888">[${msg.channel}] ${JSON.stringify(msg.data).slice(0,100)}</div>` + log.innerHTML
    return
  }
  count++
  const d = msg.data
  const sameCandle = d.t === lastOpenTime
  const color = sameCandle ? '#0ff' : '#ff0'
  lastOpenTime = d.t
  log.innerHTML = `<div style="color:${color}">#${count} t=${d.t} ${sameCandle ? 'UPDATE' : 'NEW'} O=${d.o} H=${d.h} L=${d.l} C=${d.c} V=${d.v}</div>` + log.innerHTML
}
ws.onclose = () => { status.textContent = 'DISCONNECTED'; status.style.color = '#f00' }
ws.onerror = () => { status.textContent = 'ERROR'; status.style.color = '#f00' }
</script>
</body></html>
